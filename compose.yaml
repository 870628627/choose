services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    restart: unless-stopped
    environment:
      PORT: "3001"
      DATABASE_PATH: ./data/app.db
      DATA_WORKER_PYTHON: python
      DATA_WORKER_PATH: ../data-worker/worker.py
      DATA_WORKER_TIMEOUT_MS: "60000"
      SERVER_REQUEST_TIMEOUT_MS: ${SERVER_REQUEST_TIMEOUT_MS:-900000}
      SERVER_SOCKET_TIMEOUT_MS: ${SERVER_SOCKET_TIMEOUT_MS:-0}
      TUSHARE_TOKEN: ${TUSHARE_TOKEN:-}
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-}
      TRADINGAGENTS_LLM_PROVIDER: ${TRADINGAGENTS_LLM_PROVIDER:-openai}
      TRADINGAGENTS_DEEP_THINK_LLM: ${TRADINGAGENTS_DEEP_THINK_LLM:-gpt-5.4}
      TRADINGAGENTS_QUICK_THINK_LLM: ${TRADINGAGENTS_QUICK_THINK_LLM:-gpt-5.4-mini}
      TRADINGAGENTS_LLM_BACKEND_URL: ${TRADINGAGENTS_LLM_BACKEND_URL:-}
      TRADINGAGENTS_OUTPUT_LANGUAGE: Chinese
      TRADINGAGENTS_WEB_ANALYSTS: ${TRADINGAGENTS_WEB_ANALYSTS:-market,social,news,fundamentals}
      TRADINGAGENTS_REPORT_TIMEOUT_MS: ${TRADINGAGENTS_REPORT_TIMEOUT_MS:-900000}
    volumes:
      - ./storage/sqlite:/app/server/data
    expose:
      - "3001"

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "8081:80"
