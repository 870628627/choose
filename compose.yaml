services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    restart: unless-stopped
    environment:
      PORT: "3001"
      DATABASE_PATH: ./data/app.db
      DATA_WORKER_PYTHON: python
      DATA_WORKER_PATH: ../data-worker/worker.py
      DATA_WORKER_TIMEOUT_MS: "60000"
      SERVER_REQUEST_TIMEOUT_MS: ${SERVER_REQUEST_TIMEOUT_MS:-900000}
      SERVER_SOCKET_TIMEOUT_MS: ${SERVER_SOCKET_TIMEOUT_MS:-0}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-870628627@qq.com}
      TUSHARE_TOKEN: ${TUSHARE_TOKEN:-}
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-}
      TRADINGAGENTS_LLM_PROVIDER: ${TRADINGAGENTS_LLM_PROVIDER:-deepseek}
      TRADINGAGENTS_DEEP_THINK_LLM: ${TRADINGAGENTS_DEEP_THINK_LLM:-deepseek-chat}
      TRADINGAGENTS_QUICK_THINK_LLM: ${TRADINGAGENTS_QUICK_THINK_LLM:-deepseek-chat}
      TRADINGAGENTS_LLM_BACKEND_URL: ${TRADINGAGENTS_LLM_BACKEND_URL:-}
      TRADINGAGENTS_OUTPUT_LANGUAGE: Chinese
      TRADINGAGENTS_WEB_ANALYSTS: ${TRADINGAGENTS_WEB_ANALYSTS:-market,social,news,fundamentals}
      TRADINGAGENTS_REPORT_TIMEOUT_MS: ${TRADINGAGENTS_REPORT_TIMEOUT_MS:-900000}
      TRADINGAGENTS_MAX_CONCURRENT_JOBS: ${TRADINGAGENTS_MAX_CONCURRENT_JOBS:-1}
      TRADINGAGENTS_MAX_QUEUED_PER_USER: ${TRADINGAGENTS_MAX_QUEUED_PER_USER:-3}
      TRADINGAGENTS_A_SHARE_PRICE_SOURCES: ${TRADINGAGENTS_A_SHARE_PRICE_SOURCES:-baostock,eastmoney,akshare}
      TRADINGAGENTS_A_SHARE_SOURCE_TIMEOUT: ${TRADINGAGENTS_A_SHARE_SOURCE_TIMEOUT:-20}
      TRADINGAGENTS_ENABLE_LEGACY_US_SOCIAL: ${TRADINGAGENTS_ENABLE_LEGACY_US_SOCIAL:-0}
      TRADINGAGENTS_ENABLE_SENTIMENT_YFINANCE_NEWS: ${TRADINGAGENTS_ENABLE_SENTIMENT_YFINANCE_NEWS:-0}
    volumes:
      - ./storage/sqlite:/app/server/data
    expose:
      - "3001"

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "8081:80"
